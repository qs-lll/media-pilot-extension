<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>侧边栏插件测试页</title>
    <style>
      body {
        margin: 0;
        color: #1f2937;
        background: #ffffff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        padding: 18px 32px;
        border-bottom: 1px solid #e5e7eb;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px);
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 24px;
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px;
      }

      article,
      aside {
        min-height: 720px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        line-height: 1.7;
      }

      .block {
        margin-bottom: 18px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 18px;
        background: #f9fafb;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>侧边栏插件测试页</h1>
    </header>
    <main>
      <article>
        <div class="block">
          <h2>内容区</h2>
          <p>点击浏览器扩展图标后，Chrome 会在右侧打开原生侧边栏，网页内容保留在左侧。</p>
        </div>
        <div class="block">
          <h2>滚动验证</h2>
          <p>页面仍然可以正常滚动，右侧插件面板由浏览器侧边栏承载。</p>
        </div>
        <div class="block">
          <h2>布局验证</h2>
          <p>侧边栏宽度由 Chrome 管理，扩展只负责渲染右侧面板内容。</p>
        </div>
      </article>
      <aside class="block">
        <h2>页面侧栏</h2>
        <p>这个区域用于验证原网页自身的侧栏不会被插件直接覆盖。</p>
      </aside>
    </main>
  </body>
</html>
